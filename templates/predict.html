<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wale Lab | Crop Prediction</title>

<style>
    body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(135deg, #0f172a, #020617);
        color: #e5e7eb;
    }

    .container {
        max-width: 800px;
        margin: 50px auto;
        padding: 40px;
        background: linear-gradient(160deg, #1e293b, #0f172a);
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.15);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }

    h2 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 28px;
        color: #7dd3fc;
    }

    .section-title {
        margin: 26px 0 12px;
        font-size: 15px;
        font-weight: 600;
        color: #bae6fd;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        font-weight: 500;
        color: #cbd5f5;
    }

    input, select {
        width: 100%;
        padding: 11px 12px;
        border-radius: 8px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: #020617;
        color: #e5e7eb;
        font-size: 14px;
    }

    input:focus, select:focus {
        outline: none;
        border-color: #38bdf8;
        box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.4);
    }

    button {
        width: 100%;
        padding: 15px;
        margin-top: 28px;
        background: linear-gradient(135deg, #38bdf8, #0ea5e9);
        color: #020617;
        border: none;
        font-size: 16px;
        font-weight: 600;
        border-radius: 10px;
        cursor: pointer;
    }

    .back-home {
        display: block;
        margin-top: 18px;
        text-align: center;
        padding: 12px;
        border-radius: 10px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        color: #7dd3fc;
        border: 1px solid rgba(125, 211, 252, 0.3);
        transition: 0.3s;
    }

    .back-home:hover {
        background: rgba(125, 211, 252, 0.08);
    }

    @media (max-width: 640px) {
        .grid {
            grid-template-columns: 1fr;
        }
    }
</style>
</head>

<body>
<div class="container">
    <h2>Crop Prediction</h2>

    <form method="POST" action="/predict" id="cropForm" novalidate>

        <div class="section-title">Soil Properties</div>
        <div class="grid">
            <div>
                <label>Soil pH</label>
                <input type="number" step="0.01" name="Soil_pH" min="0" max="14" required>
            </div>

            <div>
                <label>Soil Color</label>
                <select name="Soil_Color" required>
                    <option value="">Select</option>
                    <option value="black">Black</option>
                    <option value="brown">Brown</option>
                    <option value="reddish brown">Reddish Brown</option>
                </select>
            </div>
        </div>

        <div class="section-title">Nutrient Composition (mg/kg)</div>
        <div class="grid">
            <div>
                <label>Nitrogen (N) </label>
                <input type="number" step="0.01" name="Nitrogen_N" min="0" required>
            </div>

            <div>
                <label>Phosphorus (P) </label>
                <input type="number" step="0.01" name="Phosphorus_P" min="0" required>
            </div>

            <div>
                <label>Potassium (K) </label>
                <input type="number" step="0.01" name="Potassium_K" min="0" required>
            </div>

            <div>
                <label>Zinc (Zn) </label>
                <input type="number" step="0.01" name="Zinc_Zn" min="0" required>
            </div>

            <div>
                <label>Sulphur (S) </label>
                <input type="number" step="0.01" name="Sulphur_S" min="0" required>
            </div>
        </div>

        <div class="section-title">Weather Conditions</div>
        <div class="grid">
            <div>
                <label>Rainfall (mm)</label>
                <input type="number" step="0.01" name="Rainfall" min="0" required>
            </div>

            <div>
                <label>Temperature (°C)</label>
                <input type="number" step="0.01" name="Temperature" max="36" required>
            </div>

            <div>
                <label>Humidity (%)</label>
                <input type="number" step="0.01" name="Humidity" min="0" max="100" required>
            </div>
        </div>

        <button type="submit">Predict Crop</button>
    </form>

    <a href="/" class="back-home"> Back Home</a>
</div>

<script>
document.getElementById("cropForm").addEventListener("submit", function (e) {

    const requiredFields = [
        "Soil_pH","Nitrogen_N","Phosphorus_P","Potassium_K",
        "Zinc_Zn","Sulphur_S","Rainfall","Temperature","Humidity"
    ];

    for (let field of requiredFields) {
        const el = document.querySelector(`[name="${field}"]`);
        if (!el.value || isNaN(el.value)) {
            alert("Please ensure all fields are filled correctly.");
            e.preventDefault();
            return;
        }
    }

    const ph = +document.querySelector('[name="Soil_pH"]').value;
    const temp = +document.querySelector('[name="Temperature"]').value;
    const humidity = +document.querySelector('[name="Humidity"]').value;
    const rainfall = +document.querySelector('[name="Rainfall"]').value;

    if (ph < 0 || ph > 14 || temp > 36 || humidity < 0 || humidity > 100 || rainfall < 0) {
        alert("One or more values are outside acceptable ranges.");
        e.preventDefault();
    }
});
</script>

</body>
</html>
